<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Forge | Portal Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --card: #ffffff;
      --line: #e5e7eb;
      --cream: #f8f4ef;
      --orange: #f4600c;
      --orange-dark: #c84800;
      --shadow: 0 14px 38px rgba(17, 24, 39, 0.14);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Epilogue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 10% -10%, #ffd9c3 0%, transparent 60%),
        radial-gradient(1000px 420px at 100% 110%, #bde4ea 0%, transparent 58%),
        linear-gradient(170deg, #fffaf5 0%, #f5f7f9 100%);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .wrap {
      width: min(1080px, 100%);
    }

    .hero {
      margin-bottom: 24px;
      text-align: left;
    }

    .kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 14px 0 10px;
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: clamp(2rem, 3.2vw, 3rem);
      line-height: 1.1;
      max-width: 15ch;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.6vw, 1.08rem);
      line-height: 1.6;
      max-width: 70ch;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      display: flex;
      flex-direction: column;
      min-height: 290px;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      opacity: 0.12;
      pointer-events: none;
    }

    .employee::after { background: var(--orange); }
    .hiring::after { background: var(--orange); }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 22px;
      margin-bottom: 14px;
    }

    .employee .icon { background: #fff1e8; }
    .hiring .icon { background: #fff1e8; }

    .title {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: 1.5rem;
      line-height: 1.2;
    }

    .desc {
      margin: 10px 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .list {
      margin: 0 0 22px;
      padding-left: 18px;
      color: #374151;
      line-height: 1.6;
      font-size: 0.9rem;
      flex: 1;
    }

    .cta {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.93rem;
      padding: 11px 14px;
      border-radius: 11px;
      text-align: center;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .employee .cta {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 8px 22px rgba(244, 96, 12, 0.3);
    }

    .employee .cta:hover {
      background: var(--orange-dark);
      transform: translateY(-1px);
    }

    .hiring .cta {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 8px 22px rgba(244, 96, 12, 0.3);
    }

    .hiring .cta:hover {
      background: var(--orange-dark);
      transform: translateY(-1px);
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 260px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <span class="kicker">HR Forge Workspace</span>
      <h1>Choose The Dashboard You Want To Work In</h1>
      <p class="sub">Use Workforce Hub for day-to-day HR operations and records, or open Hiring Portal for AI-assisted job description generation and direct social publishing.</p>
    </section>

    <section class="grid" aria-label="Portal options">
      <article class="card employee">
        <div class="icon" aria-hidden="true"></div>
        <h2 class="title">Workforce Hub</h2>
        <p class="desc"></p>
        <ul class="list">
       
        </ul>
        <a class="cta" href="/employee-hub">Open Workforce Hub</a>
      </article>

      <article class="card hiring">
        <div class="icon" aria-hidden="true"></div>
        <h2 class="title">Hiring Portal</h2>
        <p class="desc"></p>
        <ul class="list">
         
        </ul>
        <a class="cta" href="/hiring-portal">Open Hiring Portal</a>
      </article>
    </section>
  </div>
</body>
</html>
